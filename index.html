<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>استمارة البحث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --bg-color: #f8f9fa;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --form-text-size: 1.1rem;
        }

        * {
            font-family: 'Tajawal', sans-serif !important;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            padding-top: 60px;
            direction: rtl;
            line-height: 1.6;
            color: #4a5568;
            font-size: 16px;
            scroll-behavior: smooth;
        }

        #timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: #2c3e50;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #progress-container {
            position: fixed;
            top: 50px;
            left: 0;
            width: 100%;
            height: 5px;
            background: #e2e8f0;
            z-index: 1000;
        }

        #progress-bar {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.5s ease;
        }

        .container {
            max-width: 850px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: var(--card-shadow);
        }

        h2 {
            text-align: center;
            color: var(--secondary-color);
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 12px;
        }

        .question-block {
            background: #fff;
            border: 1px solid #e8edf3;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
            transition: var(--transition);
        }

        .q-label {
            display: block;
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 14px;
            line-height: 1.9;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr;
        }

        .radio-card-label {
            display: block;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            color: #2d3748;
            text-align: center;
        }

        .radio-card-label:hover {
            background: #edf6ff;
            border-color: #90cdf4;
            transform: translateY(-2px);
        }

        .radio-card-label.checked {
            background: #3498db;
            color: white;
            border-color: #3498db;
            box-shadow: 0 4px 10px rgba(52,152,219,0.25);
        }

        .radio-card-label input {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: var(--primary-color);
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
            transition: var(--transition);
        }

        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #95a5a6;
            cursor: wait;
        }

        .hidden {
            display: none !important;
        }

        .ltr-text {
            direction: ltr;
            display: inline-block;
            unicode-bidi: bidi-override;
        }

        .input-error {
            border-color: #e74c3c !important;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .instruction-line {
            display: block;
            margin-bottom: 10px;
            position: relative;
            padding-right: 15px;
        }

        .instruction-line::before {
            content: "•";
            position: absolute;
            right: 0;
            color: var(--primary-color);
            font-weight: bold;
        }

        .welcome-instructions {
            font-size: 1.1em;
            line-height: 1.9;
        }

        .timer-wait-msg {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            background: #fff9db;
            border-radius: 10px;
            border: 2px dashed #f1c40f;
            color: #d35400;
            font-weight: bold;
        }

        #loading-overlay {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .studied-term {
            color: #c0392b;
            font-weight: 800;
            font-size: 1em;
        }

        .container p,
        .container li,
        .container label,
        .container th,
        .container td,
        .container input,
        .container textarea {
            font-size: var(--form-text-size) !important;
        }

        .sd-item {
            background: #fff;
            border: 1px solid #e8edf3;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            transition: var(--transition);
        }

        .sd-item.input-error {
            background: #fff5f5;
            border-color: #e74c3c !important;
        }

        .sd-role {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 14px;
            line-height: 1.8;
            text-align: center;
        }

        .sd-likert-row {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 6px;
            width: 100%;
        }

        .sd-likert-option {
            min-width: 0;
            width: 100%;
            text-align: center;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 4px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 700;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 64px;
        }

        .sd-likert-option:hover {
            background: #edf6ff;
            border-color: #90cdf4;
            transform: translateY(-2px);
        }

        .sd-likert-option.checked {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
            box-shadow: 0 4px 10px rgba(52,152,219,0.22);
        }

        .sd-likert-option input {
            display: none;
        }

        .sd-likert-option .sd-top {
            display: block;
            font-size: 0.92em;
            line-height: 1.2;
            word-break: break-word;
        }

        .ref-term-header {
            text-align: center;
            color: #b30000;
            font-weight: 800;
            font-size: 1.6em;
            margin-bottom: 20px;
        }

        .ref-short-wrap {
            animation: fadeIn 0.4s ease;
        }

        .ref-short-q {
            background: #ffffff;
            border: 1px solid #e8edf3;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
        }

        .ref-short-q .main-q {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            line-height: 1.9;
        }

        .ref-short-q .sub-q {
            color: #6b7280;
            margin-bottom: 12px;
            line-height: 1.8;
            font-size: 0.98em;
        }

        .ref-short-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: #fff;
            transition: var(--transition);
        }

        .ref-short-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
        }

        .char-note {
            display: block;
            margin-top: 8px;
            color: #6b7280;
            font-size: 0.9em;
        }

        .share-request {
            color: #c00000;
            font-weight: 800;
            font-size: 1.2em;
            line-height: 1.9;
            margin-top: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            .container {
                padding: 25px 16px;
                margin: 15px 8px;
            }

            .sd-likert-row {
                gap: 4px;
            }

            .sd-likert-option {
                padding: 8px 2px;
                min-height: 58px;
                border-radius: 10px;
            }

            .sd-likert-option .sd-top {
                font-size: 0.78em;
                line-height: 1.15;
            }
        }

        @media (max-width: 420px) {
            .sd-likert-option .sd-top {
                font-size: 0.72em;
            }

            .sd-likert-option {
                min-height: 54px;
                padding: 7px 1px;
            }
        }
    </style>
</head>
<body>

    <div id="timer-bar">
        <span id="global-timer" style="font-family:monospace; direction:ltr;">00:00</span>
        <span>بحث علمي</span>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="container" id="main-container">
        <div class="timer-wait-msg">جار تحميل الاستمارة...</div>
        <noscript><div class="timer-wait-msg">هذه الاستمارة تحتاج تفعيل JavaScript في المتصفح.</div></noscript>
    </div>

<script>
(function () {
  'use strict';

  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaQ8fzM8jdZ0QbSyo_1HoRw5MLs5zg7q_0epukhYz-wr8MHCJN6wb1_uyokgqQl45YnA/exec';

  function now() { return new Date().getTime(); }
  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  function hasClass(el, cls) {
    if (!el || !el.className) return false;
    return (' ' + el.className + ' ').indexOf(' ' + cls + ' ') !== -1;
  }

  function addClass(el, cls) {
    if (!el) return;
    if (!hasClass(el, cls)) el.className = (el.className ? el.className + ' ' : '') + cls;
  }

  function removeClass(el, cls) {
    if (!el || !el.className) return;
    var re = new RegExp('(^|\\s)' + cls + '(\\s|$)', 'g');
    el.className = el.className.replace(re, ' ').replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
  }

  function matches(el, selector) {
    var p = Element.prototype;
    var f = p.matches || p.webkitMatchesSelector || p.msMatchesSelector || p.mozMatchesSelector;
    if (!f) return false;
    return f.call(el, selector);
  }

  function closest(el, selector) {
    while (el && el.nodeType === 1) {
      if (matches(el, selector)) return el;
      el = el.parentElement;
    }
    return null;
  }

  function safeScrollIntoView(el) {
    if (!el) return;
    try { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    catch (e) { try { el.scrollIntoView(true); } catch (e2) {} }
  }

  function fisherYatesShuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  }

  var labelOptions = [
    {
      id: 1,
      text: "الشخص ذو الإعاقة الذهنية",
      sd_intro: 'مع شخصٍ ذي إعاقة ذهنية',
      fam_q: '<span class="studied-term">"شخص ذو إعاقة ذهنية"</span>: إلى أي حد تصادف هذا اللفظ (سماعا أو قراءة) في حياتك اليومية؟',
      clear_q: 'ما مدى وضوح هذا اللفظ: <span class="studied-term">"شخص ذو إعاقة ذهنية"</span> بالنسبة إليك؟'
    },
    {
      id: 2,
      text: "الشخص المعاق ذهنياً",
      sd_intro: 'مع شخصٍ معاقٍ ذهنياً',
      fam_q: '<span class="studied-term">"شخص معاق ذهنيا"</span>: إلى أي حد تصادف هذا اللفظ (سماعا أو قراءة) في حياتك اليومية؟',
      clear_q: 'ما مدى وضوح هذا اللفظ: <span class="studied-term">"شخص معاق ذهنياً"</span> بالنسبة إليك؟'
    },
    {
      id: 3,
      text: "الشخص في وضعية إعاقة ذهنية",
      sd_intro: 'مع شخصٍ في وضعية إعاقة ذهنية',
      fam_q: '<span class="studied-term">"شخص في وضعية إعاقة ذهنية"</span>: إلى أي حد تصادف هذا اللفظ (سماعا أو قراءة) في حياتك اليومية؟',
      clear_q: 'ما مدى وضوح هذا اللفظ: <span class="studied-term">"شخص في وضعية إعاقة ذهنية"</span> بالنسبة إليك؟'
    },
    {
      id: 4,
      text: "الشخص المتأخر ذهنياً",
      sd_intro: 'مع شخصٍ متأخرٍ ذهنياً',
      fam_q: '<span class="studied-term">"شخص متأخر ذهنيا"</span>: إلى أي حد تصادف هذا اللفظ (سماعا أو قراءة) في حياتك اليومية؟',
      clear_q: 'ما مدى وضوح هذا اللفظ: <span class="studied-term">"شخص متأخر ذهنياً"</span> بالنسبة إليك؟'
    }
  ];

  var selectedLabel = labelOptions[Math.floor(Math.random() * labelOptions.length)];
  var orderGroup = 1;

  var refShortQuestions = [
    {
      id: 1,
      main: '1. يواجه هذا الشخص صعوبات كثيرة في حياته اليومية. في رأيك، ما هو السبب الأهم لهذه الصعوبات؟',
      sub: 'اذكر سبباً واحداً فقط هو الأهم في نظرك.'
    },
    {
      id: 2,
      main: '2. أحياناً، لا ينجح دمج هذا الشخص في الدراسة أو العمل. في رأيك، ما العامل أو السبب الأهم المسؤول عن هذا التعثر؟',
      sub: 'اذكر عاملاً واحداً فقط هو الأهم من وجهة نظرك.'
    },
    {
      id: 3,
      main: '3. توجد طرق وتدخلات مختلفة يمكن أن تساعد هذا الشخص. في رأيك، ما أهم تدخل يمكن أن يساعد هذا الشخص في تحسين حياته؟',
      sub: 'اذكر تدخلاً واحداً فقط تراه الأكثر فائدة.'
    }
  ];

  var randomizedRefQuestions = fisherYatesShuffle(refShortQuestions.slice());

  var responses = {
    labelId: selectedLabel.id,
    orderGroup: (orderGroup === 0 ? "Ref-First" : "SD-First"),
    startTime: now(),
    data: {
      ref_4: '',
      ref_5: '',
      time_ref_4: '',
      time_ref_5: ''
    },
    timings: {}
  };

  var currentPageIndex = 0;
  var pageSequence = [];
  var refQIndex = 0;

  function createRadioCard(name, value, labelText, extraClass) {
    extraClass = extraClass || "";
    return '' +
      '<label class="radio-card-label ' + extraClass + '" onclick="selectCard(this)">' +
        '<input type="radio" name="' + name + '" value="' + value + '">' +
        '<span>' + labelText + '</span>' +
      '</label>';
  }

  function createSDLikert(name, value, labelText) {
    return '' +
      '<label class="sd-likert-option" onclick="selectSDLikert(this)">' +
        '<input type="radio" name="' + name + '" value="' + value + '">' +
        '<span class="sd-top">' + labelText + '</span>' +
      '</label>';
  }

  window.selectCard = function (label) {
    var container = closest(label, '.options-grid') || closest(label, '.question-block');
    if (container) {
      var all = container.querySelectorAll('.radio-card-label');
      for (var i = 0; i < all.length; i++) removeClass(all[i], 'checked');
    }

    addClass(label, 'checked');

    var radio = label.querySelector('input[type="radio"]');
    if (radio) radio.checked = true;

    var blk = closest(label, '.question-block');
    if (blk) removeClass(blk, 'input-error');

    setTimeout(function () {
      if (!blk) return;
      var nextBlk = blk.nextElementSibling;
      if (nextBlk && hasClass(nextBlk, 'question-block')) safeScrollIntoView(nextBlk);
      else {
        var nextBtn = document.querySelector('.btn');
        if (nextBtn) safeScrollIntoView(nextBtn);
      }
    }, 300);
  };

  window.selectSDLikert = function (label) {
    var container = closest(label, '.sd-item');
    if (container) {
      var all = container.querySelectorAll('.sd-likert-option');
      for (var i = 0; i < all.length; i++) removeClass(all[i], 'checked');
      removeClass(container, 'input-error');
    }

    addClass(label, 'checked');

    var radio = label.querySelector('input[type="radio"]');
    if (radio) radio.checked = true;

    setTimeout(function () {
      if (!container) return;
      var nextItem = container.nextElementSibling;
      while (nextItem && !hasClass(nextItem, 'sd-item')) {
        nextItem = nextItem.nextElementSibling;
      }

      if (nextItem) {
        safeScrollIntoView(nextItem);
      } else {
        var nextBtn = document.querySelector('.btn');
        if (nextBtn) safeScrollIntoView(nextBtn);
      }
    }, 250);
  };

  function checkRadio(name, blkId) {
    if (!document.querySelector('input[name="' + name + '"]:checked')) {
      highlightError(blkId);
      return false;
    }
    return true;
  }

  function highlightError(id) {
    var el = document.getElementById(id);
    if (el) {
      addClass(el, 'input-error');
      safeScrollIntoView(el);
    }
  }

  function saveData() {
    var checked = document.querySelectorAll('input:checked');
    for (var i = 0; i < checked.length; i++) {
      responses.data[checked[i].name] = checked[i].value;
    }

    var texts = document.querySelectorAll('input[type="text"]');
    for (var j = 0; j < texts.length; j++) {
      responses.data[texts[j].name] = texts[j].value;
    }
  }

  function determinePageOrder() {
    if (orderGroup === 0) {
      pageSequence = ['welcome', 'demographics', 'ref_questions', 'social_distance', 'familiarity', 'final_demo', 'end'];
    } else {
      pageSequence = ['welcome', 'demographics', 'social_distance', 'ref_questions', 'familiarity', 'final_demo', 'end'];
    }
  }

  var pages = {};

  pages.welcome = {
    render: function () {
      return '' +
        '<div style="text-align:center;">' +
          '<h2 style="border:none;">مرحباً بك</h2>' +
        '</div>' +
        '<div class="welcome-instructions" style="background:#eef6fc; padding:25px; border-radius:10px; margin-bottom:20px; border-right:5px solid var(--primary-color);">' +
          '<p class="instruction-line">تدرس هذه الاستمارة آراء الطلبة حول قضايا الإعاقة الذهنية؛</p>' +
          '<p class="instruction-line">إجاباتكم شخصية، ليس فيها صحيح ولا خطأ،</p>' +
          '<p class="instruction-line">إجاباتكم سرية، وستستعمل لأغراض البحث العلمي فقط.</p>' +
          '<p class="instruction-line">المشاركة طوعية، ويمكن الانسحاب في أي وقت.</p>' +
          '<p class="instruction-line">لن تستغرق الإجابة عن الاستمارة أكثر من 10 دقائق.</p>' +
          '<hr style="border:0; border-top:1px solid #ccc; margin:20px 0;">' +
          '<div style="text-align:center;">' +
            '<p style="margin-bottom:5px; color:#555;">لمزيد من المعلومات يمكنكم الاتصال بالباحث:</p>' +
            '<a href="mailto:a.said.ced@uca.ac.ma" style="color:var(--primary-color); font-weight:bold; direction:ltr; display:inline-block;">a.said.ced@uca.ac.ma</a>' +
          '</div>' +
        '</div>' +
        '<div class="question-block" id="blk_agree">' +
          '<p class="q-label">هل توافق على المشاركة؟</p>' +
          '<div class="options-grid" style="grid-template-columns: 1fr 1fr;">' +
            createRadioCard('consent', 'نعم', 'نعم، أوافق') +
            createRadioCard('consent', 'لا', 'لا') +
          '</div>' +
        '</div>';
    },
    validate: function () {
      var consent = document.querySelector('input[name="consent"]:checked');
      if (!consent) {
        highlightError('blk_agree');
        return false;
      }
      if (consent.value === 'لا') {
        alert('لا يمكن الاستمرار دون موافقة.');
        return false;
      }
      return true;
    }
  };

  pages.demographics = {
    render: function () {
      return '' +
        '<h2>البيانات الشخصية</h2>' +
        '<div class="question-block" id="blk_gender">' +
          '<span class="q-label">1. الجنس:</span>' +
          '<div class="options-grid">' +
            createRadioCard('gender', 'ذكر', 'ذكر') +
            createRadioCard('gender', 'أنثى', 'أنثى') +
          '</div>' +
        '</div>' +
        '<div class="question-block" id="blk_age">' +
          '<span class="q-label">2. السن:</span>' +
          '<div class="options-grid">' +
            createRadioCard('age', '18-21', '<span class="ltr-text">18-21</span>') +
            createRadioCard('age', '22-25', '<span class="ltr-text">22-25</span>') +
            createRadioCard('age', '26-29', '<span class="ltr-text">26-29</span>') +
            createRadioCard('age', '30-33', '<span class="ltr-text">30-33</span>') +
            createRadioCard('age', '34-37', '<span class="ltr-text">34-37</span>') +
            createRadioCard('age', '38-41', '<span class="ltr-text">38-41</span>') +
            createRadioCard('age', '42+', '<span class="ltr-text">42+</span>') +
          '</div>' +
        '</div>' +
        '<div class="question-block" id="blk_edu">' +
          '<span class="q-label">3. المستوى الجامعي الحالي:</span>' +
          '<div class="options-grid">' +
            createRadioCard('edu', 'license', 'إجازة') +
            createRadioCard('edu', 'master', 'ماستر') +
            createRadioCard('edu', 'phd', 'دكتوراه') +
            createRadioCard('edu', 'other', 'أخرى') +
          '</div>' +
        '</div>' +
        '<div class="question-block" id="blk_major">' +
          '<span class="q-label">4. التخصص الجامعي:</span>' +
          '<input type="text" name="major" placeholder="اكتب تخصصك هنا..." style="width:100%; padding:15px; border:2px solid #e2e8f0; border-radius:10px;">' +
        '</div>';
    },
    validate: function () {
      var valid = true;
      if (!checkRadio('gender', 'blk_gender')) valid = false;
      if (!checkRadio('age', 'blk_age')) valid = false;
      if (!checkRadio('edu', 'blk_edu')) valid = false;

      var maj = document.querySelector('input[name="major"]');
      if (!maj || maj.value.replace(/^\s+|\s+$/g, '').length < 2) {
        if (maj) addClass(maj, 'input-error');
        valid = false;
      } else {
        removeClass(maj, 'input-error');
      }

      if (!valid) alert("يرجى إكمال البيانات المطلوبة.");
      return valid;
    }
  };

  pages.social_distance = {
    render: function () {
      var roles = [
        "أقبل أن يكون: زوجاً/زوجة",
        "أقبل أن يكون: صهراً (زوج/ة لأحد الأقارب)",
        "أقبل أن يكون: جار(ة) في السكن",
        "أقبل أن يكون: صديقاً (ة) مقرباً (ة)",
        "أقبل أن يكون: زميلاً (ة) في الدراسة",
        "أقبل أن تقتصر علاقتي به/بها على الحد الأدنى فقط"
      ];

      var items = '';
      for (var i = 0; i < roles.length; i++) {
        var idx = i + 1;
        items += '' +
          '<div class="sd-item" id="row_sd_' + idx + '">' +
            '<div class="sd-role">' + roles[i] + '</div>' +
            '<div class="sd-likert-row">' +
              createSDLikert('mds_' + idx, '5', 'أوافق بشدة') +
              createSDLikert('mds_' + idx, '4', 'أوافق') +
              createSDLikert('mds_' + idx, '3', 'محايد') +
              createSDLikert('mds_' + idx, '2', 'أعارض') +
              createSDLikert('mds_' + idx, '1', 'أعارض بشدة') +
            '</div>' +
          '</div>';
      }

      return '' +
        '<div style="background:#fff5f5; padding:20px; border-radius:10px; margin-bottom:20px; border:1px dashed #e74c3c; line-height:1.9; font-size:1.1em;">' +
          '<p style="margin:0 0 10px 0;">فيما يلي مجموعة من العلاقات الاجتماعية.</p>' +
          '<p style="margin:0 0 10px 0;">يرجى تحديد درجة موافقتك الشخصية على إمكانية إقامة كل من هذه العلاقات <span class="studied-term">' + selectedLabel.sd_intro + '</span>.</p>' +
          '<p style="margin:0 0 8px 0;"><b>ملاحظة:</b> لا توجد إجابات صحيحة أو خاطئة.</p>' +
          '<p style="margin:0;">عبِّر عن رأيك الشخصي في كل علاقة على حدة.</p>' +
        '</div>' +
        '<div id="sd_timer" class="timer-wait-msg">المرجو الانتظار... <span id="sd_count">5</span></div>' +
        '<div id="sd_content" class="hidden">' + items + '</div>';
    },
    validate: function () {
      var sdContent = document.getElementById('sd_content');
      if (sdContent && hasClass(sdContent, 'hidden')) return false;

      var valid = true;
      for (var i = 1; i <= 6; i++) {
        var checked = document.querySelector('input[name="mds_' + i + '"]:checked');
        var row = document.getElementById('row_sd_' + i);
        if (!checked) {
          if (row) addClass(row, 'input-error');
          valid = false;
        } else {
          if (row) removeClass(row, 'input-error');
        }
      }

      if (!valid) alert("يرجى الإجابة على جميع البنود.");
      return valid;
    }
  };

  pages.ref_questions = {
    render: function () {
      return '' +
        '<div id="ref_q_container"></div>' +
        '<button id="ref_next_btn" class="btn" onclick="nextRefQuestion()">التالي</button>';
    },
    validate: function () {
      return false;
    }
  };

  pages.familiarity = {
    render: function () {
      var freq = ['نادرًا جدًا', 'نادرًا', 'أحيانًا', 'كثيرا', 'كثيرا جداً'];
      var clear = ['غامض جداً', 'غامض', 'واضح نوعاً ما', 'واضح', 'واضح جداً'];
      var i, cards1 = '', cards2 = '';

      for (i = 0; i < freq.length; i++) cards1 += createRadioCard('fam_freq', String(i + 1), freq[i]);
      for (i = 0; i < clear.length; i++) cards2 += createRadioCard('fam_clear', String(i + 1), clear[i]);

      return '' +
        '<h2>معلومات إضافية</h2>' +
        '<div class="question-block" id="blk_fam1">' +
          '<p class="q-label">1. ' + selectedLabel.fam_q + '</p>' +
          '<div class="options-grid" style="grid-template-columns: 1fr;">' + cards1 + '</div>' +
        '</div>' +
        '<div class="question-block" id="blk_fam2">' +
          '<p class="q-label">2. ' + selectedLabel.clear_q + '</p>' +
          '<div class="options-grid" style="grid-template-columns: 1fr;">' + cards2 + '</div>' +
        '</div>';
    },
    validate: function () {
      if (!checkRadio('fam_freq', 'blk_fam1') || !checkRadio('fam_clear', 'blk_fam2')) {
        alert('يرجى الإجابة');
        return false;
      }
      return true;
    }
  };

  pages.final_demo = {
    render: function () {
      var know = ['لا أملك تقريباً أي معرفة', 'معرفة بسيطة', 'معرفة متوسطة', 'معرفة جيدة', 'معرفة ممتازة'];
      var i, cards = '';
      for (i = 0; i < know.length; i++) cards += createRadioCard('know', String(i + 1), know[i]);

      return '' +
        '<h2>أسئلة ختامية</h2>' +
        '<div class="question-block" id="blk_know">' +
          '<p class="q-label">1. كيف تقيّم مستوى معرفتك العام بقضايا الإعاقة الذهنية؟</p>' +
          '<div class="options-grid" style="grid-template-columns: 1fr;">' + cards + '</div>' +
        '</div>' +
        '<div class="question-block" id="blk_contact">' +
          '<p class="q-label">2. هل سبق لك أن كانت لك علاقة مباشرة بشخص لديه إعاقة ذهنية؟</p>' +
          '<div class="options-grid" style="grid-template-columns: 1fr;">' +
            createRadioCard('contact', 'لا', 'لا') +
            createRadioCard('contact', 'نعم، علاقة سطحية (في الحي، في الدراسة، في العمل...).', 'نعم، علاقة سطحية (في الحي، في الدراسة، في العمل...).') +
            createRadioCard('contact', 'نعم، علاقة مقربة (صديق، قريب من العائلة...).', 'نعم، علاقة مقربة (صديق، قريب من العائلة...).') +
            createRadioCard('contact', 'نعم، علاقة قرابة من الدرجة الأولى (أخ، ابن، والد...).', 'نعم، علاقة قرابة من الدرجة الأولى (أخ، ابن، والد...).') +
          '</div>' +
        '</div>' +
        '<div class="question-block" id="blk_att" style="opacity:0.8; transform:scale(0.95); background:#fffbf0; border:1px dashed orange;">' +
          '<p class="q-label" style="color:#d35400;">3. للتحقق من الانتباه، يرجى اختيار الخيار “99” في هذا السؤال:</p>' +
          '<div class="options-grid">' +
            createRadioCard('att_chk', '99', '99') +
            createRadioCard('att_chk', '100', '100') +
          '</div>' +
        '</div>';
    },
    validate: function () {
      if (!checkRadio('know', 'blk_know') || !checkRadio('contact', 'blk_contact') || !checkRadio('att_chk', 'blk_att')) {
        alert("يرجى الإجابة على الكل.");
        return false;
      }
      return true;
    }
  };

  pages.end = {
    render: function () {
      return '' +
        '<div style="text-align:center; padding:50px 0;">' +
          '<div style="font-size:70px; color:#27ae60; margin-bottom:20px;">✓</div>' +
          '<h2 style="border:none; color:#27ae60;">تم الإرسال بنجاح</h2>' +
          '<p style="font-size:1.2em;">شكراً جزيلاً لمساهمتكم القيمة في هذا البحث العلمي.</p>' +
          '<p class="share-request">وسنكون شاكرين لكم لو تكرمتم بتقاسم رابط هذه الاستمارة مع طلبة آخرين من معارفكم</p>' +
        '</div>';
    },
    validate: function () {
      return true;
    }
  };

  function renderRefQuestionDynamic() {
    if (refQIndex >= randomizedRefQuestions.length) {
      currentPageIndex++;
      renderPage();
      return;
    }

    var q = randomizedRefQuestions[refQIndex];
    responses.timings['ref_start_' + q.id] = now();

    var html = '' +
      '<div class="ref-short-wrap">' +
        '<div class="ref-term-header">' + selectedLabel.text + '</div>' +
        '<div class="ref-short-q" id="ref_blk_' + q.id + '">' +
          '<div class="main-q">' + q.main + '</div>' +
          '<div class="sub-q">' + q.sub + '</div>' +
          '<input type="text" class="ref-short-input" id="ref_input_' + q.id + '" name="ref_' + q.id + '" maxlength="60" placeholder="اكتب جواباً مختصراً جداً..." autocomplete="off">' +
          '<span class="char-note">الحد الأقصى: 60 حرفاً</span>' +
        '</div>' +
      '</div>';

    var c = document.getElementById('ref_q_container');
    if (c) c.innerHTML = html;

    setTimeout(function () {
      var inp = document.getElementById('ref_input_' + q.id);
      if (inp) {
        inp.focus();
        inp.oninput = function () {
          removeClass(inp, 'input-error');
          var blk = document.getElementById('ref_blk_' + q.id);
          if (blk) removeClass(blk, 'input-error');
        };
      }
    }, 50);
  }

  function saveCurrentRefTextAnswer() {
    if (refQIndex >= randomizedRefQuestions.length) return false;

    var q = randomizedRefQuestions[refQIndex];
    var inp = document.getElementById('ref_input_' + q.id);
    var blk = document.getElementById('ref_blk_' + q.id);
    var val = inp ? inp.value.replace(/^\s+|\s+$/g, '') : '';

    if (!val) {
      if (inp) addClass(inp, 'input-error');
      if (blk) addClass(blk, 'input-error');
      if (inp) safeScrollIntoView(inp);
      alert('يرجى إدخال إجابة مختصرة قبل المتابعة.');
      return false;
    }

    if (val.length > 60) {
      if (inp) addClass(inp, 'input-error');
      if (blk) addClass(blk, 'input-error');
      alert('الحد الأقصى للإجابة هو 60 حرفاً.');
      return false;
    }

    var startKey = 'ref_start_' + q.id;
    var t0 = responses.timings[startKey];
    var t = (typeof t0 === 'number') ? (now() - t0) : '';

    responses.data['ref_' + q.id] = val;
    responses.data['time_ref_' + q.id] = t;

    return true;
  }

  window.nextRefQuestion = function () {
    var currentPageName = pageSequence[currentPageIndex];

    if (currentPageName === 'ref_questions') {
      if (!saveCurrentRefTextAnswer()) return;
      refQIndex++;
      renderRefQuestionDynamic();
    }
  };

  function submitSurvey() {
    saveData();

    if (typeof responses.data.ref_4 === 'undefined') responses.data.ref_4 = '';
    if (typeof responses.data.ref_5 === 'undefined') responses.data.ref_5 = '';
    if (typeof responses.data.time_ref_4 === 'undefined') responses.data.time_ref_4 = '';
    if (typeof responses.data.time_ref_5 === 'undefined') responses.data.time_ref_5 = '';

    var qScore = 100;
    if (responses.data.att_chk !== "99") qScore -= 50;

    var sdVals = [];
    for (var i = 1; i <= 6; i++) {
      var v = responses.data['mds_' + i];
      if (v) sdVals.push(v);
    }

    if (sdVals.length === 6) {
      var same = true;
      for (var j = 1; j < sdVals.length; j++) {
        if (sdVals[j] !== sdVals[0]) {
          same = false;
          break;
        }
      }
      if (same) qScore -= 20;
    }

    responses.qualityScore = qScore;
    responses.duration = (now() - responses.startTime) / 1000;

    var iframe = document.createElement('iframe');
    iframe.name = 'hidden_iframe_submit';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    var form = document.createElement('form');
    form.action = SCRIPT_URL;
    form.method = 'POST';
    form.target = iframe.name;

    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify(responses);

    form.appendChild(input);
    document.body.appendChild(form);

    try { form.submit(); } catch (e) {}

    setTimeout(function () {
      var container = document.getElementById('main-container');
      if (container) container.innerHTML = pages.end.render();
    }, 900);
  }

  function renderPage() {
    var pageKey = pageSequence[currentPageIndex];
    var container = document.getElementById('main-container');
    if (!container) return;

    if (pageKey === 'end') {
      container.innerHTML = '' +
        '<div id="loading-overlay">' +
          '<div class="spinner"></div>' +
          '<h3>جار إرسال إجاباتك...</h3>' +
          '<p>المرجو الانتظار قليلاً وعدم إغلاق الصفحة.</p>' +
        '</div>';

      var pb = document.getElementById('progress-bar');
      if (pb) pb.style.width = '100%';

      submitSurvey();
      return;
    }

    container.innerHTML = pages[pageKey].render();
    window.scrollTo(0, 0);

    var prog = (currentPageIndex / (pageSequence.length - 1)) * 100;
    var pb2 = document.getElementById('progress-bar');
    if (pb2) pb2.style.width = prog + '%';

    if (pageKey === 'social_distance') {
      responses.timings.sd_start = now();
      var count = 5;
      var timerEl = document.getElementById('sd_count');
      var int1 = setInterval(function () {
        count--;
        if (timerEl) timerEl.innerText = String(count);
        if (count <= 0) {
          clearInterval(int1);
          addClass(document.getElementById('sd_timer'), 'hidden');
          removeClass(document.getElementById('sd_content'), 'hidden');
        }
      }, 1000);
    } else if (pageKey === 'ref_questions') {
      renderRefQuestionDynamic();
    }

    if (pageKey !== 'end' && pageKey !== 'ref_questions') {
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerText = 'التالي';
      btn.onclick = function () {
        if (pages[pageKey].validate()) {
          saveData();
          currentPageIndex++;
          renderPage();
        }
      };
      container.appendChild(btn);
    }
  }

  setInterval(function () {
    var diff = Math.floor((now() - responses.startTime) / 1000);
    var m = Math.floor(diff / 60);
    var s = diff % 60;
    var t = pad2(m) + ':' + pad2(s);
    var gt = document.getElementById('global-timer');
    if (gt) gt.innerText = t;
  }, 1000);

  determinePageOrder();
  renderPage();
})();
</script>
