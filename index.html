<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>استمارة البحث </title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- المتغيرات والتنسيقات الأساسية --- */
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --right-color: #c0392b;
            --left-color: #2980b9;
            --green-header: #1e7e34;
            --bg-color: #f8f9fa;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --form-text-size: 1.1rem;
        }

        * {
            font-family: 'Tajawal', sans-serif !important;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            padding-top: 60px;
            direction: rtl;
            line-height: 1.6;
            color: #4a5568;
            font-size: 16px;
            scroll-behavior: smooth; /* تفعيل التمرير الناعم */
        }

        /* --- شريط الأدوات العلوي --- */
        #timer-bar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 50px;
            background: #2c3e50; color: white;
            padding: 0 20px; display: flex; align-items: center;
            justify-content: space-between;
            z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #progress-container {
            position: fixed;
            top: 50px; left: 0; width: 100%; height: 5px;
            background: #e2e8f0; z-index: 1000;
        }
        #progress-bar {
            height: 100%;
            background: var(--primary-color); width: 0%;
            transition: width 0.5s ease;
        }

        

        /* --- تنبيه تدوير الهاتف --- */
        .orientation-hint{
            max-width: 800px;
            margin: 10px auto 0 auto;
            background: #fff9db;
            border: 1px dashed #f1c40f;
            border-radius: 12px;
            padding: 12px 16px;
            color: #7a4b00;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        @media (min-width: 901px) {
            .orientation-hint{ display:none; }
        }
.container {
            max-width: 800px;
            margin: 30px auto;
            background: white; padding: 30px; /* تقليل الهامش قليلاً للموبايل */
            border-radius: 20px; box-shadow: var(--card-shadow);
            min-height: 60vh;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* تأثير النبض عند الاختيار */
        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h2 { color: var(--secondary-color); margin-bottom: 25px; border-bottom: 3px solid #f1f1f1; padding-bottom: 10px; display: inline-block; }

        /* --- تنسيقات بطاقات الاختيار --- */
        .question-block { margin-bottom: 30px; scroll-margin-top: 100px; /* لضبط التمرير */ }
        .q-label { font-weight: 700; margin-bottom: 15px; display: block; font-size: 1.1em; color: #2d3748; }
        
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .options-grid > * { flex: 1 1 140px; }

        @supports (display: grid) {
            .options-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 15px;
            }
            .options-grid > * { flex: initial; }
        }

        .radio-card-label {
            position: relative;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
            font-weight: 500; color: #4a5568;
        }

        .radio-card-label input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .radio-card-label:hover { border-color: #cbd5e0; background: #f7fafc; transform: translateY(-2px); }
        
        /* حالة الاختيار مع تأثير النبض */
        .radio-card-label.checked {
            border-color: var(--primary-color); 
            background-color: #ebf8ff;
            color: var(--primary-color); font-weight: 700;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2);
            animation: pulse-animation 0.3s ease-in-out;
        }

        /* --- تنسيقات قسم المرجعية --- */
        .ref-header { 
            text-align: center; margin-bottom: 15px; font-weight: 800; 
            color: var(--green-header); font-size: 1.6em; 
            padding: 10px; border-bottom: 2px solid #eee;
        }
        .ref-intro-q { text-align: center; margin-bottom: 30px; font-size: 1.1em; color: #444; line-height: 1.8; font-weight: 500; }
        
        .ref-split-container {
            display: flex; gap: 15px; justify-content: center; align-items: stretch; margin-bottom: 30px;
            position: relative;
        }
        
        .neutral-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .neutral-btn {
            background: linear-gradient(90deg, var(--left-color) 0 50%, var(--right-color) 50% 100%);
            border: 2px solid #95a5a6; color: white;
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.9em; cursor: pointer;
            transition: var(--transition); text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .neutral-btn:hover { filter: brightness(1.05); transform: scale(1.1); }
        .neutral-btn.selected {
            background: linear-gradient(90deg, var(--left-color) 0 50%, var(--right-color) 50% 100%);
            color: white; border-color: #34495e;
            transform: scale(1.1);
            box-shadow: 0 0 0 3px rgba(52,73,94,0.25), 0 0 15px rgba(0,0,0,0.2);
        }

        .choice-card {
            flex: 1; padding: 25px 15px; border-radius: 15px;
            border: 3px solid transparent; background: #f8f9fa;
            text-align: center; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1em; font-weight: 700; min-height: 130px;
        }

        .choice-card.right-card { border-color: #fadbd8; color: #c0392b; background: #fff5f5; }
        .choice-card.right-card.selected { background: #c0392b; color: white; border-color: #c0392b; box-shadow: 0 5px 15px rgba(192, 57, 43, 0.4); transform: scale(1.05); }

        .choice-card.left-card { border-color: #d6eaf8; color: #2980b9; background: #ebf5fb; }
        .choice-card.left-card.selected { background: #2980b9; color: white; border-color: #2980b9; box-shadow: 0 5px 15px rgba(41, 128, 185, 0.4); transform: scale(1.05); }

        .choice-card.dimmed { opacity: 0.3; transform: scale(0.95); }

        .intensity-section { text-align: center; margin-top: 30px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
        
        .neutral-explain{
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(0,0,0,0.04);
            font-weight: 600;
            color: #2c3e50;
            text-align: center;
        }
        .neutral-explain.hidden{ display:none; }

        .intensity-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-direction: row-reverse; }
        .int-btn {
            width: auto; min-width: 90px; padding: 10px 15px; height: auto;
            border-radius: 12px; border: 2px solid #e2e8f0; background: white;
            font-size: 1em; font-weight: bold; color: #718096;
            cursor: pointer; transition: var(--transition);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .int-btn:hover { background: #edf2f7; transform: translateY(-3px); }
        .int-btn.active { color: white; border-color: transparent; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .int-btn.active:nth-child(1) { background-color: #27ae60; }
        .int-btn.active:nth-child(2) { background-color: #f39c12; }
        .int-btn.active:nth-child(3) { background-color: #e67e22; }

        .ref-feedback {
            margin-top: 25px; padding: 15px; border-radius: 8px; background: #f0fff4; border: 1px solid #c6f6d5;
            color: #276749; text-align: center; font-weight: bold; display: none;
        }

        .table-scroll-wrapper { overflow-x: auto; margin-bottom: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; min-width: 650px; border-collapse: collapse; background: white; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #edf2f7; }
        th { background: #f8fafc; color: #4a5568; font-size: var(--form-text-size); }
        td:first-child { text-align: right; width: 35%; font-weight: 600; background: #fff; position: sticky; right: 0; border-left: 2px solid #e2e8f0; }
        
        td.clickable-cell { cursor: pointer; transition: background 0.2s; }
        td.clickable-cell:hover { background-color: #f7fafc; }
        td.clickable-cell:active { background-color: #ebf8ff; }
        
        .table-radio { width: 24px; height: 24px; cursor: pointer; accent-color: var(--primary-color); pointer-events: none; }
        
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            background: var(--primary-color); color: white; font-size: 1.1em; font-weight: bold;
            cursor: pointer; margin-top: 30px; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
            transition: var(--transition);
        }
        .btn:hover { background: #2980b9; transform: translateY(-2px); }
        .btn:disabled { background: #95a5a6; cursor: wait; }

        .hidden { display: none !important; }
        .ltr-text { direction: ltr; display: inline-block; unicode-bidi: bidi-override; }
        .input-error { border-color: #e74c3c !important; animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

        .instruction-line { display: block; margin-bottom: 10px; position: relative; padding-right: 15px; }
        .instruction-line::before { content: "•"; position: absolute; right: 0; color: var(--primary-color); font-weight: bold; }


        /* إبراز "اللفظ المدروس" */
        .studied-term{
            color:#c0392b;
            font-weight:800;
            font-size:1em;
        }

        /* تعليمات المسافة الاجتماعية */
        .sd-question-line{
            color:#000;
            font-weight:700;
            margin:10px 0;
            text-align:center;
        }

        
        /* توحيد حجم خط التعليمات وعوارض الترحيب والأسئلة (بنفس حجم "إلى أي حدّ...") */
        .container p,
        .container li,
        .container label,
        .container th,
        .container td {
            font-size: var(--form-text-size) !important;
        }
        .container th { font-size: var(--form-text-size) !important; }
        .container td:first-child { font-size: var(--form-text-size) !important; }

/* صفحة الترحيب */
        .welcome-instructions{
            font-size:1.1em;
            line-height:1.9;
        }
        
        .timer-wait-msg {
            text-align: center; padding: 40px; font-size: 1.2em;
            background: #fff9db; border-radius: 10px; border: 2px dashed #f1c40f;
            color: #d35400; font-weight: bold;
        }
        
        /* رسالة التحميل */
        #loading-overlay {
            text-align: center; padding: 50px;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid var(--primary-color);
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .container { padding: 25px 20px; margin: 15px 10px; }
            .ref-split-container { flex-direction: column; gap: 20px; }
            .neutral-wrapper { order: 2; margin: -10px 0; }
            .choice-card { min-height: 100px; order: 1; }
            .choice-card.left-card { order: 3; }
            td:first-child { width: 40%; font-size: var(--form-text-size); }
        }
    </style>
</head>
<body>

    <div class="orientation-hint" role="note" aria-label="تنبيه العرض على الهاتف">
        <h3 style="margin:0 0 6px 0;">يرجى تدوير الهاتف</h3>
        <p style="margin:0;">لأفضل عرض (خصوصًا للجداول)، يُفضّل استخدام الوضع العرضي (Landscape).</p>
    </div>

<div id="timer-bar">
    <span id="global-timer" style="font-family:monospace; direction:ltr;">00:00</span>
    <span>بحث علمي</span>
</div>

<div id="progress-container"><div id="progress-bar"></div></div>

<div class="container" id="main-container"><div class="timer-wait-msg">جار تحميل الاستمارة...</div><noscript><div class="timer-wait-msg">هذه الاستمارة تحتاج تفعيل JavaScript في المتصفح.</div></noscript></div>


<script>
/*

(function () {
  'use strict';

  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaQ8fzM8jdZ0QbSyo_1HoRw5MLs5zg7q_0epukhYz-wr8MHCJN6wb1_uyokgqQl45YnA/exec';

  function now() { return new Date().getTime(); }
  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  function hasClass(el, cls) {
    if (!el || !el.className) return false;
    return (' ' + el.className + ' ').indexOf(' ' + cls + ' ') !== -1;
  }
  function addClass(el, cls) {
    if (!el) return;
    if (!hasClass(el, cls)) el.className = (el.className ? el.className + ' ' : '') + cls;

  function removeClass(el, cls) {
    if (!el || !el.className) return;
    var re = new RegExp('(^|\\s)' + cls + '(\\s|$)', 'g');
    el.className = el.className.replace(re, ' ').replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
  }

  function matches(el, selector) {
    var p = Element.prototype;
    var f = p.matches || p.webkitMatchesSelector || p.msMatchesSelector || p.mozMatchesSelector;

  }

    while (el && el.nodeType === 1) {
      if (matches(el, selector)) return el;
      el = el.parentElement;

  }

  function fisherYatesShuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  var labelOptions = [
    {
      id: 1, text: "الشخص ذو الإعاقة الذهنية",
      sd_intro: 'تحديد درجة موافقتك على إمكانية إقامة كل من هذه العلاقات مع <span style="color:#c0392b; font-weight:800; font-size:1.1em;">شخصٍ ذي إعاقة ذهنية</span>:',

    },
    {

      sd_intro: 'تحديد درجة موافقتك على إمكانية إقامة كل من هذه العلاقات مع <span style="color:#c0392b; font-weight:800; font-size:1.1em;">شخصٍ في وضعية إعاقة ذهنية</span>:',

    }
  ];

  var selectedLabel = labelOptions[Math.floor(Math.random() * labelOptions.length)];
var orderGroup = 1; // SD-First دائماً
  var rawRefQuestions = [
    {

    {

    {

    {

      intro: "تتدخل عدة عوامل في تعثر الدمج الاجتماعي والتعليمي... لهذا الشخص، لكن في نظرك من المسؤول الأول عن ذلك ؟<br><small>(اقرأ الإجابتين معا، ثم اختر أكثرها موافقة لرأيك الشخصي)</small>"
    }
  ];

  var randomizedRefQuestions = fisherYatesShuffle(rawRefQuestions.slice());

  var responses = {
    labelId: selectedLabel.id,
    orderGroup: (orderGroup === 0 ? "Ref-First" : "SD-First"),
    startTime: now(),
    data: {},
    timings: {}
  };

  var currentPageIndex = 0;

  function createRadioCard(name, value, labelText, extraClass) {
    extraClass = extraClass || "";
    return '' +
      '<label class="radio-card-label ' + extraClass + '" onclick="selectCard(this)">' +
        '<input type="radio" name="' + name + '" value="' + value + '">' +
        '<span>' + labelText + '</span>' +
      '</label>';
  }

  window.selectCard = function (label) {
    var container = closest(label, '.options-grid') || closest(label, '.question-block');
    if (container) {
      var all = container.querySelectorAll('.radio-card-label');
      for (var i = 0; i < all.length; i++) removeClass(all[i], 'checked');
    }
    addClass(label, 'checked');

    var radio = label.querySelector('input[type="radio"]');
    if (radio) radio.checked = true;

    var blk = closest(label, '.question-block');
    if (blk) removeClass(blk, 'input-error');

    setTimeout(function () {
      if (!blk) return;
      var nextBlk = blk.nextElementSibling;
      if (nextBlk && hasClass(nextBlk, 'question-block')) safeScrollIntoView(nextBlk);
      else {
        var nextBtn = document.querySelector('.btn');
        if (nextBtn) safeScrollIntoView(nextBtn);
      }
    }, 300);
  };

  window.selectTableCell = function (td) {
    var radio = td.querySelector('input[type="radio"]');
    if (radio) {
      radio.checked = true;
      var tr = td.parentElement;
      if (tr) tr.style.background = "transparent";
    }
  };

  function checkRadio(name, blkId) {
    if (!document.querySelector('input[name="' + name + '"]:checked')) {
      highlightError(blkId);
      return false;
    }
    return true;
  }

  function highlightError(id) {
    var el = document.getElementById(id);
    if (el) {
      addClass(el, 'input-error');
      safeScrollIntoView(el);
    }
  }

  function saveData() {
    var checked = document.querySelectorAll('input:checked');
    for (var i = 0; i < checked.length; i++) responses.data[checked[i].name] = checked[i].value;

    var texts = document.querySelectorAll('input[type="text"]');
    for (var j = 0; j < texts.length; j++) responses.data[texts[j].name] = texts[j].value;
  }

    if (id !== 'ex') {
      removeClass(document.getElementById('card_right_' + id), 'selected');
      removeClass(document.getElementById('card_right_' + id), 'dimmed');
      removeClass(document.getElementById('card_left_' + id), 'selected');
      removeClass(document.getElementById('card_left_' + id), 'dimmed');
      removeClass(document.getElementById('btn_neutral_' + id), 'selected');
      var explain = document.getElementById('neutral_explain_' + id);
      if (explain) addClass(explain, 'hidden');
    } else {
      var r = document.querySelector('.right-card');
      var l = document.querySelector('.left-card');
      var n = document.querySelector('.neutral-btn');
      removeClass(r, 'selected'); removeClass(r, 'dimmed');
      removeClass(l, 'selected'); removeClass(l, 'dimmed');
      removeClass(n, 'selected');
    }

    if (side === 'neutral') {
      currentRefState.intensity = null;

      if (id !== 'ex') {
        addClass(document.getElementById('btn_neutral_' + id), 'selected');
        addClass(document.getElementById('card_right_' + id), 'dimmed');
        addClass(document.getElementById('card_left_' + id), 'dimmed');
        addClass(document.getElementById('intensity_' + id), 'hidden');
        saveRefAnswer(id, 0);
        var ex = document.getElementById('neutral_explain_' + id);
        if (ex) removeClass(ex, 'hidden');

        var nextBtn = document.getElementById('ref_next_btn');
        if (nextBtn) { removeClass(nextBtn, 'hidden'); safeScrollIntoView(nextBtn); }
      } else {
        addClass(document.querySelector('.neutral-btn'), 'selected');
        addClass(document.querySelector('.right-card'), 'dimmed');
        addClass(document.querySelector('.left-card'), 'dimmed');
        addClass(document.getElementById('ex_intensity'), 'hidden');
        var fb = document.getElementById('ex_feedback');
        if (fb) { fb.innerText = "اخترت الحياد، أي أنك تميل (ين) إلي الأسلوبين بالقدر نفسه"; fb.style.display = 'block'; }
        var nb = document.getElementById('ref_next_btn');
        if (nb) { removeClass(nb, 'hidden'); safeScrollIntoView(nb); }
      }
    } else {
      currentRefState.intensity = null;

      var card = (id !== 'ex')
        ? document.getElementById('card_' + side + '_' + id)
        : (side === 'right' ? document.querySelector('.right-card') : document.querySelector('.left-card'));

      var otherCard = (id !== 'ex')
        ? document.getElementById('card_' + (side === 'right' ? 'left' : 'right') + '_' + id)
        : (side === 'right' ? document.querySelector('.left-card') : document.querySelector('.right-card'));

      addClass(card, 'selected');
      addClass(otherCard, 'dimmed');

      var intSec = (id !== 'ex') ? document.getElementById('intensity_' + id) : document.getElementById('ex_intensity');
      removeClass(intSec, 'hidden');

      var nextBtn2 = document.getElementById('ref_next_btn');
      if (nextBtn2) addClass(nextBtn2, 'hidden');

      safeScrollIntoView(intSec);

      var btns = intSec ? intSec.querySelectorAll('.int-btn') : [];
      for (var i = 0; i < btns.length; i++) removeClass(btns[i], 'active');
    }
  };

  window.handleIntClick = function (val, id, btn) {
    currentRefState.intensity = val;

    var all = btn.parentElement ? btn.parentElement.querySelectorAll('.int-btn') : [];
    for (var i = 0; i < all.length; i++) removeClass(all[i], 'active');
    addClass(btn, 'active');

    if (id === 'ex') {
      var fb = document.getElementById('ex_feedback');
      if (fb) { fb.innerText = "ممتاز! لقد حددت درجة موافقتك."; fb.style.display = 'block'; }
      var nb = document.getElementById('ref_next_btn');
      if (nb) { removeClass(nb, 'hidden'); safeScrollIntoView(nb); }
    } else {
      var finalVal = (currentRefState.side === 'right') ? val : -val;
      var ex = document.getElementById('neutral_explain_' + id);
      if (ex) addClass(ex, 'hidden');
      saveRefAnswer(id, finalVal);

      var nextBtn = document.getElementById('ref_next_btn');
      if (nextBtn) { removeClass(nextBtn, 'hidden'); safeScrollIntoView(nextBtn); }
    }
  };

  function saveRefAnswer(qId, val) {
    var startKey = 'ref_start_' + qId;
    var t0 = responses.timings[startKey];
    var t = (typeof t0 === 'number') ? (now() - t0) : null;
    responses.data['ref_' + qId] = val;
    responses.data['time_ref_' + qId] = t;
  }

  window.nextRefQuestion = function () {
    var currentPageName = pageSequence[currentPageIndex];
    if (currentPageName === 'ref_questions') {
      if (!currentRefState || !currentRefState.side) return;
      if (currentRefState.side !== 'neutral' && !currentRefState.intensity) return;
    }
    if (currentPageName === 'ref_intro') {
      currentPageIndex++;
      renderPage();
    } else {
      refQIndex++;
      renderRefQuestionDynamic();
    }
  };

  function submitSurvey() {
    saveData();

    var qScore = 100;
    if (responses.data.att_chk !== "99") qScore -= 50;

    var sdVals = [];
    for (var i = 1; i <= 6; i++) {
      var v = responses.data['mds_' + i];
      if (v) sdVals.push(v);
    }
    if (sdVals.length === 6) {
      var same = true;
      for (var j = 1; j < sdVals.length; j++) if (sdVals[j] !== sdVals[0]) { same = false; break; }
      if (same) qScore -= 20;
    }

    responses.qualityScore = qScore;
    responses.duration = (now() - responses.startTime) / 1000;

    var payload = 'payload=' + encodeURIComponent(JSON.stringify(responses));

    // أفضل خيار (لا يحتاج CORS): إرسال عبر form إلى iframe مخفي.
    var iframe = document.createElement('iframe');
    iframe.name = 'hidden_iframe_submit';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    var form = document.createElement('form');
    form.action = SCRIPT_URL;
    form.method = 'POST';
    form.target = iframe.name;

    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify(responses);

    form.appendChild(input);
    document.body.appendChild(form);

    try { form.submit(); } catch (e) {}

    // عرض الشكر دون انتظار استجابة (Google Apps Script غالبًا يعيد redirect/صفحة).
    setTimeout(function () {
      var container = document.getElementById('main-container');
      if (container) container.innerHTML = pages.end.render();
    }, 900);
  }

  function renderPage() {
    var pageKey = pageSequence[currentPageIndex];
    var container = document.getElementById('main-container');
    if (!container) return;

    if (pageKey === 'end') {
      container.innerHTML = '' +
        '<div id="loading-overlay">' +
          '<div class="spinner"></div>' +
          '<h3>جار إرسال إجاباتك...</h3>' +
          '<p>المرجو الانتظار قليلاً وعدم إغلاق الصفحة.</p>' +
        '</div>';
      var pb = document.getElementById('progress-bar');
      if (pb) pb.style.width = '100%';
      submitSurvey();
      return;
    }

    container.innerHTML = pages[pageKey].render();
    window.scrollTo(0, 0);

    var prog = (currentPageIndex / (pageSequence.length - 1)) * 100;
    var pb2 = document.getElementById('progress-bar');
    if (pb2) pb2.style.width = prog + '%';

    if (pageKey === 'social_distance') {
      responses.timings.sd_start = now();
      var count = 5;
      var timerEl = document.getElementById('sd_count');
      var int1 = setInterval(function () {
        count--;
        if (timerEl) timerEl.innerText = String(count);
        if (count <= 0) {
          clearInterval(int1);
          addClass(document.getElementById('sd_timer'), 'hidden');
          removeClass(document.getElementById('sd_content'), 'hidden');
        }
      }, 1000);
    } else if (pageKey === 'ref_intro') {
      var count2 = 5;
      var timerEl2 = document.getElementById('intro_count');
      var int2 = setInterval(function () {
        count2--;
        if (timerEl2) timerEl2.innerText = String(count2);
        if (count2 <= 0) {
          clearInterval(int2);
          addClass(document.getElementById('intro_timer'), 'hidden');
          removeClass(document.getElementById('ex_container'), 'hidden');
        }
      }, 1000);

      var b = document.createElement('button');
      b.id = 'ref_next_btn';
      b.className = 'btn hidden';
      b.innerText = 'ابدأ الأسئلة';
      b.onclick = window.nextRefQuestion;
      container.appendChild(b);
    } else if (pageKey === 'ref_questions') {
      renderRefQuestionDynamic();
    }

    if (pageKey !== 'end' && pageKey !== 'ref_questions' && pageKey !== 'ref_intro') {
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerText = 'التالي';
      btn.onclick = function () {
        if (pages[pageKey].validate()) {
          saveData();
          currentPageIndex++;
          renderPage();
        }
      };
      container.appendChild(btn);
    }
  }

  // Global timer
  setInterval(function () {
    var diff = Math.floor((now() - responses.startTime) / 1000);
    var m = Math.floor(diff / 60);
    var s = diff % 60;
    var t = pad2(m) + ':' + pad2(s);
    var gt = document.getElementById('global-timer');
    if (gt) gt.innerText = t;
  }, 1000);

  determinePageOrder();
  renderPage();
})();
</script>
